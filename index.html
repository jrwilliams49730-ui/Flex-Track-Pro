<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flex Track Pro</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:#fff;
}
header{
text-align:center;
padding:14px;
background:#111;
border-bottom:1px solid #222;
}
header img{
width:92%;
max-width:520px;
}
.wrap{
padding:14px;
}
.card{
background:#171717;
border-radius:18px;
padding:16px;
margin-bottom:14px;
}
button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#ff8a1f;
color:#111;
font-weight:900;
font-size:20px;
margin-top:10px;
}
.red{
background:#ff4d4d;
color:#fff;
}
.small{
font-size:13px;
color:#aaa;
}
.footer{
text-align:center;
color:#777;
padding:24px;
font-size:13px;
}
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #333;
background:#1f1f1f;
color:#fff;
box-sizing:border-box;
margin-top:8px;
}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}
.hidden{
display:none;
}
.item{
padding:8px 0;
border-bottom:1px solid #222;
font-size:14px;
}
</style>
</head>

<body>

<header>
<img src="logo-main.png" alt="Flex Track Pro">
</header>

<div class="wrap">

<!-- MAIN SCREEN -->
<div class="card">
<h2>Live Block</h2>

<div>Status: <span id="status">Ready</span></div>
<div class="small">Time: <span id="time">00:00:00</span></div>
<div class="small">Miles: <span id="miles">0.00</span></div>

<button id="startBtn" onclick="startBlock()">START BLOCK</button>
<button id="stopBtn" class="red hidden" onclick="stopBlock()">END BLOCK</button>

</div>

<!-- POPUP SCREEN -->
<div id="saveCard" class="card hidden">
<h2>Block Complete</h2>

<div class="row">
<input id="pay" placeholder="Pay">
<input id="hours" placeholder="Hours">
</div>

<div class="row">
<input id="stops" placeholder="Stops">
<input id="packages" placeholder="Packages">
</div>

<button onclick="saveBlock()">SAVE BLOCK</button>
</div>

<!-- HISTORY -->
<div class="card">
<h2>History</h2>
<div id="history"></div>
</div>

</div>

<div class="footer">© Static Entertainment 2026</div>

<script>
let startTime=0;
let timer=null;
let watch=null;
let miles=0;
let last=null;

let blocks=JSON.parse(localStorage.getItem("ftpBlocks")||"[]");

function fmt(sec){
let h=String(Math.floor(sec/3600)).padStart(2,'0');
let m=String(Math.floor((sec%3600)/60)).padStart(2,'0');
let s=String(sec%60).padStart(2,'0');
return h+':'+m+':'+s;
}

function dist(a,b,c,d){
const R=3958.8;
const p=Math.PI/180;
let x=(c-a)*p;
let y=(d-b)*p;
let q=Math.sin(x/2)**2+
Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;
return 2*R*Math.asin(Math.sqrt(q));
}

function startBlock(){
startTime=Date.now();
miles=0;
last=null;

document.getElementById("status").innerText="Tracking";

document.getElementById("startBtn").classList.add("hidden");
document.getElementById("stopBtn").classList.remove("hidden");

timer=setInterval(()=>{
let sec=Math.floor((Date.now()-startTime)/1000);
document.getElementById("time").innerText=fmt(sec);
},1000);

if(navigator.geolocation){
watch=navigator.geolocation.watchPosition(pos=>{
let la=pos.coords.latitude;
let lo=pos.coords.longitude;

if(last){
let d=dist(last[0],last[1],la,lo);
if(d>.01)miles+=d;
}

last=[la,lo];
document.getElementById("miles").innerText=miles.toFixed(2);

},()=>{
document.getElementById("status").innerText="GPS Blocked";
});
}
}

function stopBlock(){

if(timer)clearInterval(timer);
if(watch)navigator.geolocation.clearWatch(watch);

document.getElementById("status").innerText="Stopped";

document.getElementById("stopBtn").classList.add("hidden");
document.getElementById("startBtn").classList.remove("hidden");

document.getElementById("saveCard").classList.remove("hidden");
}

function saveBlock(){

let block={
date:new Date().toLocaleDateString(),
pay:document.getElementById("pay").value,
hours:document.getElementById("hours").value,
stops:document.getElementById("stops").value,
packages:document.getElementById("packages").value,
miles:miles.toFixed(2)
};

blocks.unshift(block);

localStorage.setItem("ftpBlocks",JSON.stringify(blocks));

document.getElementById("pay").value="";
document.getElementById("hours").value="";
document.getElementById("stops").value="";
document.getElementById("packages").value="";

document.getElementById("saveCard").classList.add("hidden");

renderHistory();
}

function renderHistory(){

let el=document.getElementById("history");

if(blocks.length===0){
el.innerHTML='<div class="small">No blocks saved yet.</div>';
return;
}

el.innerHTML=blocks.map(b=>`
<div class="item">
${b.date} | $${b.pay} | ${b.hours} hrs | ${b.stops} stops | ${b.packages} pkgs | ${b.miles} mi
</div>
`).join('');
}

renderHistory();
</script>

</body>
</html>

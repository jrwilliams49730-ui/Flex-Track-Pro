<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Flex Track Pro</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#0a0a0a; --card:#171717; --line:#2b2b2b; --text:#ffffff;
      --muted:#a9a9a9; --orange:#ff8a1f; --green:#7ad96b; --red:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:14px;background:#111;border-bottom:1px solid #222;text-align:center}
    header img{max-width:520px;width:92%;height:auto;display:block;margin:0 auto}
    .brand-fallback{font-size:34px;font-weight:900;letter-spacing:-1px}
    .brand-fallback .orange{color:var(--orange)}
    .wrap{padding:14px;max-width:760px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    h2{margin:0 0 12px;font-size:20px}
    .small{font-size:13px;color:var(--muted)}
    .livebox{background:#101010;border:1px solid #242424;border-radius:16px;padding:16px;text-align:center;margin-bottom:12px}
    .pill{display:inline-block;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700}
    .pill.ready{background:rgba(255,107,107,.14);color:#ffb0b0}
    .pill.live{background:rgba(122,217,107,.14);color:#a7f59a}
    .huge{font-size:34px;font-weight:900;margin:8px 0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    input,select,textarea,button{
      width:100%;padding:14px;border-radius:12px;border:1px solid #333;
      background:#1f1f1f;color:#fff;font-size:16px;margin-top:8px
    }
    textarea{min-height:84px;resize:vertical}
    button{border:none;background:var(--orange);color:#111;font-weight:900}
    button.secondary{background:#303030;color:#fff}
    button.green{background:var(--green)}
    button.red{background:var(--red)}
    .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .history-item{padding:12px 0;border-bottom:1px solid #252525}
    .meta{line-height:1.55}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .footer{text-align:center;color:#777;padding:22px 14px;font-size:13px}
    @media(max-width:520px){
      .row,.toolbar,.actions{grid-template-columns:1fr}
      .brand-fallback{font-size:30px}
    }
  </style>
</head>
<body>
<header>
  <img src="logo-main.png" alt="Flex Track Pro" onerror="this.outerHTML='<div class=&quot;brand-fallback&quot;>Flex <span class=&quot;orange&quot;>Track</span> Pro</div>';">
</header>

<div class="wrap">
  <div class="card">
    <h2>Live Block</h2>
    <div class="livebox">
      <div id="statusPill" class="pill ready">Ready</div>
      <div class="small" style="margin-top:10px">Elapsed Time</div>
      <div id="elapsed" class="huge">00:00:00</div>
      <div class="small">Miles Tracked</div>
      <div id="milesLive" class="huge">0.00</div>
      <div id="gpsMsg" class="small">Tap start when you leave.</div>
    </div>
    <div class="row">
      <button class="green" onclick="startBlock()">START BLOCK</button>
      <button class="red" onclick="stopBlock()">END BLOCK</button>
    </div>
  </div>

  <div class="card">
    <h2 id="formTitle">Save Block</h2>
    <div class="row">
      <input id="pay" type="number" step="0.01" placeholder="Pay">
      <input id="hours" type="number" step="0.1" placeholder="Hours">
    </div>
    <div class="row">
      <input id="stops" type="number" placeholder="Stops">
      <input id="packages" type="number" placeholder="Packages">
    </div>
    <div class="row">
      <select id="sentHome">
        <option value="No">Sent Home: No</option>
        <option value="Yes">Sent Home: Yes</option>
      </select>
      <input id="blockDate" type="date">
    </div>
    <textarea id="notes" placeholder="Notes"></textarea>
    <div class="row">
      <button onclick="saveBlock()">SAVE BLOCK</button>
      <button class="secondary" onclick="resetForm()">RESET FORM</button>
    </div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div class="toolbar">
      <button onclick="exportCSV()">EXPORT CSV</button>
      <button onclick="exportXLSX()">EXPORT XLSX</button>
    </div>
    <div id="history"></div>
  </div>
</div>

<div class="footer">© Static Entertainment 2026</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
  const STORAGE_KEY = "ftp_blocks_final";
  let blocks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let editId = null;

  let startTime = null;
  let timer = null;
  let watchId = null;
  let miles = 0;
  let lastPoint = null;

  const $ = (id) => document.getElementById(id);

  function todayISO(){
    const d = new Date();
    const offset = d.getTimezoneOffset();
    return new Date(d.getTime() - offset * 60000).toISOString().slice(0,10);
  }

  function fmt(sec){
    const h = String(Math.floor(sec/3600)).padStart(2,'0');
    const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
    const s = String(sec%60).padStart(2,'0');
    return `${h}:${m}:${s}`;
  }

  function haversine(lat1, lon1, lat2, lon2){
    const R = 3958.8;
    const p = Math.PI / 180;
    const dLat = (lat2-lat1) * p;
    const dLon = (lon2-lon1) * p;
    const a = Math.sin(dLat/2)**2 +
      Math.cos(lat1*p) * Math.cos(lat2*p) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function setLive(yes){
    $("statusPill").className = "pill " + (yes ? "live" : "ready");
    $("statusPill").textContent = yes ? "Tracking" : "Ready";
  }

  function startBlock(){
    startTime = Date.now();
    miles = 0;
    lastPoint = null;
    $("gpsMsg").textContent = "Starting GPS tracking...";
    setLive(true);
    $("elapsed").textContent = "00:00:00";
    $("milesLive").textContent = "0.00";

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      const sec = Math.floor((Date.now() - startTime) / 1000);
      $("elapsed").textContent = fmt(sec);
    }, 1000);

    if (!navigator.geolocation){
      $("gpsMsg").textContent = "GPS not supported on this browser.";
      return;
    }

    watchId = navigator.geolocation.watchPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        if (lastPoint){
          const d = haversine(lastPoint.lat, lastPoint.lon, lat, lon);
          if (d > 0.01) miles += d;
        }
        lastPoint = {lat, lon};
        $("milesLive").textContent = miles.toFixed(2);
        $("gpsMsg").textContent = "GPS tracking active.";
      },
      err => {
        $("gpsMsg").textContent = "GPS error: " + err.message;
      },
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
    );
  }

  function stopBlock(){
    if (timer){ clearInterval(timer); timer = null; }
    if (watchId !== null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
    setLive(false);
    $("gpsMsg").textContent = "Tracking stopped.";
  }

  function resetForm(){
    editId = null;
    $("formTitle").textContent = "Save Block";
    $("pay").value = "";
    $("hours").value = "";
    $("stops").value = "";
    $("packages").value = "";
    $("sentHome").value = "No";
    $("notes").value = "";
    $("blockDate").value = todayISO();
  }

  function saveToStorage(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(blocks));
  }

  function saveBlock(){
    const block = {
      id: editId || Date.now(),
      date: $("blockDate").value || todayISO(),
      pay: $("pay").value || "",
      hours: $("hours").value || "",
      stops: $("stops").value || "",
      packages: $("packages").value || "",
      sentHome: $("sentHome").value,
      notes: $("notes").value || "",
      miles: miles.toFixed(2),
      elapsed: $("elapsed").textContent
    };

    if (editId){
      blocks = blocks.map(b => b.id === editId ? block : b);
    } else {
      blocks.unshift(block);
    }

    saveToStorage();
    renderHistory();
    resetForm();
  }

  function editBlock(id){
    const b = blocks.find(x => x.id === id);
    if (!b) return;
    editId = id;
    $("formTitle").textContent = "Edit Block";
    $("blockDate").value = b.date || todayISO();
    $("pay").value = b.pay;
    $("hours").value = b.hours;
    $("stops").value = b.stops;
    $("packages").value = b.packages;
    $("sentHome").value = b.sentHome || "No";
    $("notes").value = b.notes || "";
    $("elapsed").textContent = b.elapsed || "00:00:00";
    $("milesLive").textContent = Number(b.miles || 0).toFixed(2);
    miles = Number(b.miles || 0);
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function deleteBlock(id){
    blocks = blocks.filter(b => b.id !== id);
    saveToStorage();
    renderHistory();
  }

  function historyRows(){
    return blocks.map(b => ({
      Date: b.date,
      Pay: b.pay,
      Hours: b.hours,
      Stops: b.stops,
      Packages: b.packages,
      SentHome: b.sentHome,
      Miles: b.miles,
      Elapsed: b.elapsed,
      Notes: b.notes
    }));
  }

  function exportCSV(){
    const rows = historyRows();
    if (!rows.length) return;
    const headers = Object.keys(rows[0]);
    const csv = [
      headers.join(","),
      ...rows.map(r => headers.map(h => `"${String(r[h] ?? "").replace(/"/g,'""')}"`).join(","))
    ].join("\\n");

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "flex-track-pro.csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportXLSX(){
    const rows = historyRows();
    if (!rows.length || typeof XLSX === "undefined") return;
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Blocks");
    XLSX.writeFile(wb, "flex-track-pro.xlsx");
  }

  function renderHistory(){
    const history = $("history");
    if (!blocks.length){
      history.innerHTML = '<div class="small">No saved blocks yet.</div>';
      return;
    }

    history.innerHTML = blocks.map(b => `
      <div class="history-item">
        <div class="meta">
          <strong>${b.date}</strong><br>
          $${b.pay || "0"} | ${b.hours || "0"} hrs | ${b.miles || "0.00"} mi | ${b.elapsed || "00:00:00"}<br>
          ${b.stops || "0"} stops | ${b.packages || "0"} packages | Sent Home: ${b.sentHome || "No"}<br>
          <span class="small">${(b.notes || "").replace(/</g,"&lt;")}</span>
        </div>
        <div class="actions">
          <button onclick="editBlock(${b.id})">EDIT</button>
          <button class="secondary" onclick="deleteBlock(${b.id})">DELETE</button>
        </div>
      </div>
    `).join('');
  }

  $("blockDate").value = todayISO();
  renderHistory();
</script>
</body>
</html>

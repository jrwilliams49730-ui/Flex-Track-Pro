<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flex Track Pro</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0a0a0a;
color:#fff;
}
header{
background:#111;
padding:14px;
text-align:center;
border-bottom:1px solid #222;
}
header img{
max-width:520px;
width:92%;
}
.fallback{
font-size:34px;
font-weight:900;
}
.orange{color:#ff8a1f;}
.wrap{
padding:14px;
max-width:760px;
margin:auto;
}
.card{
background:#171717;
padding:16px;
border-radius:18px;
margin-bottom:14px;
}
h2{margin-top:0}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}
input,button,select{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}
input,select{
background:#1f1f1f;
color:#fff;
}
button{
background:#ff8a1f;
color:#111;
font-weight:900;
}
.secondary{
background:#333;
color:#fff;
}
.small{
font-size:13px;
color:#aaa;
}
.item{
padding:10px 0;
border-bottom:1px solid #252525;
}
.footer{
text-align:center;
color:#777;
padding:20px;
font-size:13px;
}
@media(max-width:520px){
.row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
<img src="logo-main.png" onerror="this.outerHTML='<div class=fallback>Flex <span class=orange>Track</span> Pro</div>'">
</header>

<div class="wrap">

<div class="card">
<h2>Live Block</h2>
<div>Status: <span id="status">Ready</span></div>
<div class="small">Time: <span id="time">00:00:00</span></div>
<div class="small">Miles: <span id="miles">0.00</span></div>

<div class="row">
<button onclick="startBlock()">START BLOCK</button>
<button class="secondary" onclick="stopBlock()">END BLOCK</button>
</div>
</div>

<div class="card">
<h2 id="formTitle">Save Block</h2>

<div class="row">
<input id="pay" placeholder="Pay">
<input id="hours" placeholder="Hours">
</div>

<div class="row">
<input id="stops" placeholder="Stops">
<input id="packages" placeholder="Packages">
</div>

<div class="row">
<select id="senthome">
<option>No Sent Home</option>
<option>Sent Home</option>
</select>

<input id="date" type="date">
</div>

<div class="row">
<button onclick="saveBlock()">SAVE</button>
<button class="secondary" onclick="resetForm()">RESET</button>
</div>

</div>

<div class="card">
<h2>History</h2>

<div class="row">
<button onclick="exportCSV()">EXPORT CSV</button>
<button onclick="clearAll()" class="secondary">CLEAR ALL</button>
</div>

<div id="history"></div>

</div>

</div>

<div class="footer">© Static Entertainment 2026</div>

<script>
let blocks=JSON.parse(localStorage.getItem("ftpblocks")||"[]");
let editId=null;

let startTime=0;
let timer=null;
let watch=null;
let miles=0;
let last=null;

document.getElementById("date").value=new Date().toISOString().slice(0,10);

function fmt(sec){
let h=String(Math.floor(sec/3600)).padStart(2,'0');
let m=String(Math.floor((sec%3600)/60)).padStart(2,'0');
let s=String(sec%60).padStart(2,'0');
return h+':'+m+':'+s;
}

function dist(a,b,c,d){
const R=3958.8;
const p=Math.PI/180;
let x=(c-a)*p;
let y=(d-b)*p;
let q=Math.sin(x/2)**2+
Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;
return 2*R*Math.asin(Math.sqrt(q));
}

function startBlock(){
startTime=Date.now();
miles=0;
last=null;
document.getElementById("status").innerText="Tracking";

if(timer)clearInterval(timer);
timer=setInterval(()=>{
let sec=Math.floor((Date.now()-startTime)/1000);
document.getElementById("time").innerText=fmt(sec);
},1000);

if(navigator.geolocation){
watch=navigator.geolocation.watchPosition(pos=>{
let la=pos.coords.latitude;
let lo=pos.coords.longitude;

if(last){
let d=dist(last[0],last[1],la,lo);
if(d>.01)miles+=d;
}

last=[la,lo];
document.getElementById("miles").innerText=miles.toFixed(2);

},()=>{
document.getElementById("status").innerText="GPS Blocked";
});
}
}

function stopBlock(){
if(timer)clearInterval(timer);
if(watch)navigator.geolocation.clearWatch(watch);
document.getElementById("status").innerText="Stopped";
}

function saveBlock(){

let b={
id:editId||Date.now(),
date:date.value,
pay:pay.value,
hours:hours.value,
stops:stops.value,
packages:packages.value,
senthome:senthome.value,
time:time.innerText,
miles:miles.toFixed(2)
};

if(editId){
blocks=blocks.map(x=>x.id===editId?b:x);
}else{
blocks.unshift(b);
}

localStorage.setItem("ftpblocks",JSON.stringify(blocks));

render();

resetForm();
}

function render(){

if(blocks.length===0){
history.innerHTML='<div class=small>No blocks saved.</div>';
return;
}

history.innerHTML=blocks.map(b=>`
<div class=item>
<b>${b.date}</b><br>
$${b.pay} | ${b.hours} hrs | ${b.stops} stops | ${b.packages} pkgs<br>
${b.miles} mi | ${b.time} | ${b.senthome}
<div class=row>
<button onclick="editBlock(${b.id})">EDIT</button>
<button class=secondary onclick="deleteBlock(${b.id})">DELETE</button>
</div>
</div>
`).join('');
}

function editBlock(id){
let b=blocks.find(x=>x.id===id);
if(!b)return;

editId=id;

date.value=b.date;
pay.value=b.pay;
hours.value=b.hours;
stops.value=b.stops;
packages.value=b.packages;
senthome.value=b.senthome;

formTitle.innerText="Edit Block";
window.scrollTo(0,0);
}

function deleteBlock(id){
blocks=blocks.filter(x=>x.id!==id);
localStorage.setItem("ftpblocks",JSON.stringify(blocks));
render();
}

function resetForm(){
editId=null;
formTitle.innerText="Save Block";
pay.value="";
hours.value="";
stops.value="";
packages.value="";
senthome.value="No Sent Home";
}

function clearAll(){
if(confirm("Delete all saved blocks?")){
blocks=[];
localStorage.removeItem("ftpblocks");
render();
}
}

function exportCSV(){

if(blocks.length===0)return;

let csv="Date,Pay,Hours,Stops,Packages,Miles,Time,SentHome\n";

blocks.forEach(b=>{
csv+=`${b.date},${b.pay},${b.hours},${b.stops},${b.packages},${b.miles},${b.time},${b.senthome}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="flex-track-pro.csv";
a.click();

URL.revokeObjectURL(url);
}

render();
</script>

</body>
</html>

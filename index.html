<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flex Track Pro Final</title><meta name="theme-color" content="#050505"><link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}#splash{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9}#splash img{width:80%;max-width:420px}
header{text-align:center;padding:10px;background:#111;border-bottom:1px solid #222}header img{width:92%;max-width:520px}
.wrap{padding:14px}.card{background:#171717;border-radius:16px;padding:14px;margin-bottom:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,button{width:100%;padding:14px;border-radius:12px;border:1px solid #333;background:#1f1f1f;color:#fff}button{background:#ff8a1f;color:#111;font-weight:700;border:none}
.small{color:#aaa;font-size:13px}.footer{text-align:center;color:#777;padding:20px}
</style></head><body>
<div id="splash"><img src="splash.png"></div>
<header><img src="logo-main.png"></header>
<div class="wrap">
<div class="card"><h2>Live Block</h2>
<div id="status">Ready</div><div class="small">Time: <span id="time">00:00:00</span> | Miles: <span id="miles">0.00</span></div>
<button onclick="start()">START BLOCK</button><br><br><button onclick="stop()">END BLOCK</button></div>
<div class="card"><h2>Save Block</h2>
<div class="row"><input id="pay" placeholder="Pay"><input id="hours" placeholder="Hours"></div>
<div class="row"><input id="stops" placeholder="Stops"><input id="packs" placeholder="Packages"></div>
<button onclick="save()">SAVE</button></div>
<div class="card"><h2>History</h2><div id="hist"></div></div>
</div><div class="footer">© Static Entertainment 2026</div>
<script>
let watch=null,timer=null,startT=0,miles=0,last=null,data=JSON.parse(localStorage.ft||'[]');
function fmt(s){let h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),x=String(s%60).padStart(2,'0');return h+':'+m+':'+x}
function dist(a,b,c,d){const R=3958.8,p=Math.PI/180;let x=(c-a)*p,y=(d-b)*p;let q=Math.sin(x/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(q))}
function start(){startT=Date.now();miles=0;last=null;status.innerText='Tracking'; if(navigator.geolocation){watch=navigator.geolocation.watchPosition(pos=>{let la=pos.coords.latitude,lo=pos.coords.longitude;if(last){miles+=dist(last[0],last[1],la,lo)}last=[la,lo];document.getElementById('miles').innerText=miles.toFixed(2)},e=>status.innerText='GPS blocked');} timer=setInterval(()=>time.innerText=fmt(Math.floor((Date.now()-startT)/1000)),1000)}
function stop(){if(watch)navigator.geolocation.clearWatch(watch);clearInterval(timer);status.innerText='Stopped'}
function save(){data.unshift({d:new Date().toLocaleDateString(),pay:pay.value,h:hours.value,s:stops.value,p:packs.value,t:time.innerText,m:miles.toFixed(2)});localStorage.ft=JSON.stringify(data);render()}
function render(){hist.innerHTML=data.map(x=>'<div class=small>'+x.d+' | $'+x.pay+' | '+x.t+' | '+x.m+' mi | '+x.s+' stops</div><hr>').join('')}
render();setTimeout(()=>splash.style.display='none',1600);
</script></body></html>

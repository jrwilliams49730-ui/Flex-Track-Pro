<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flex Track Pro</title>
<meta name="theme-color" content="#000000">
<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial,sans-serif}
header{background:#111;padding:14px;text-align:center;border-bottom:1px solid #222}
header img{max-width:520px;width:92%}
.wrap{padding:14px;max-width:760px;margin:auto}
.card{background:#171717;padding:16px;border-radius:18px;margin-bottom:14px}
h2{margin-top:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}
input{background:#1f1f1f;color:#fff}
button{background:#ff8a1f;color:#111;font-weight:900}
.gray{background:#333;color:#fff}
.red{background:#c0392b;color:#fff}
.small{font-size:13px;color:#aaa}
.item{padding:12px 0;border-bottom:1px solid #252525}
.footer{text-align:center;color:#777;padding:20px;font-size:13px}
#saveCard{display:none}
@media(max-width:520px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
<img src="logo-main.png" onerror="this.style.display='none'">
</header>

<div class="wrap">

<div class="card">
<h2>Live Block</h2>
<div>Status: <span id="status">Ready</span></div>
<div class="small">Live Time: <span id="time">00:00:00</span></div>
<div class="small">Live Miles: <span id="miles">0.00</span></div>

<div class="row">
<button onclick="startBlock()">BEGIN BLOCK</button>
<button class="gray" onclick="endBlock()">END BLOCK</button>
</div>
</div>

<div class="card" id="saveCard">
<h2 id="formTitle">Save Block</h2>

<div class="row">
<input id="blocklength" placeholder="Block Length (3hr)">
<input id="pay" placeholder="Pay">
</div>

<div class="row">
<input id="hoursworked" placeholder="Actual Time Worked" readonly>
<input id="milesworked" placeholder="Miles Driven" readonly>
</div>

<div class="row">
<input id="stops" placeholder="Stops">
<input id="packages" placeholder="Packages">
</div>

<div class="row">
<button onclick="saveBlock()">SAVE</button>
<button class="gray" onclick="resetForm()">RESET</button>
</div>
</div>

<div class="card">
<h2>History</h2>

<div class="row">
<button onclick="exportCSV()">EXPORT CSV</button>
<button class="gray" onclick="clearAll()">CLEAR ALL</button>
</div>

<div id="history"></div>
</div>

</div>

<div class="footer">© Static Entertainment 2026</div>

<script>
let blocks =
JSON.parse(localStorage.getItem("ftpblocks") ||
localStorage.getItem("ftp_blocks") ||
localStorage.getItem("ftp_blocks_final") ||
localStorage.getItem("flextrackblocks") ||
"[]");

let timer=null;
let watch=null;
let startTime=0;
let milesNum=0;
let last=null;
let editId=null;

function fmt(sec){
let h=String(Math.floor(sec/3600)).padStart(2,'0');
let m=String(Math.floor((sec%3600)/60)).padStart(2,'0');
let s=String(sec%60).padStart(2,'0');
return h+":"+m+":"+s;
}

function dist(a,b,c,d){
const R=3958.8;
const p=Math.PI/180;
let x=(c-a)*p;
let y=(d-b)*p;
let q=Math.sin(x/2)**2+
Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;
return 2*R*Math.asin(Math.sqrt(q));
}

function startBlock(){

saveCard.style.display="none";

startTime=Date.now();
milesNum=0;
last=null;

status.innerText="Tracking";
time.innerText="00:00:00";
miles.innerText="0.00";

if(timer)clearInterval(timer);

timer=setInterval(()=>{
let sec=Math.floor((Date.now()-startTime)/1000);
time.innerText=fmt(sec);
},1000);

if(navigator.geolocation){
watch=navigator.geolocation.watchPosition(pos=>{

let la=pos.coords.latitude;
let lo=pos.coords.longitude;

if(last){
let d=dist(last[0],last[1],la,lo);
if(d>.01)milesNum+=d;
}

last=[la,lo];
miles.innerText=milesNum.toFixed(2);

});
}
}

function endBlock(){

if(timer)clearInterval(timer);
if(watch)navigator.geolocation.clearWatch(watch);

status.innerText="Stopped";

hoursworked.value=time.innerText;
milesworked.value=miles.innerText;

saveCard.style.display="block";

window.scrollTo(0,document.body.scrollHeight);
}

function saveBlock(){

let b={
id:editId||Date.now(),
date:new Date().toLocaleDateString(),
block:blocklength.value,
pay:pay.value,
worked:hoursworked.value,
miles:milesworked.value,
stops:stops.value,
packages:packages.value
};

if(editId){
blocks=blocks.map(x=>x.id===editId?b:x);
}else{
blocks.unshift(b);
}

localStorage.setItem("ftpblocks",JSON.stringify(blocks));

render();

resetForm();
}

function editBlock(id){

let b=blocks.find(x=>x.id===id);
if(!b)return;

editId=id;

formTitle.innerText="Edit Block";

blocklength.value=b.block || "";
pay.value=b.pay || "";
hoursworked.value=b.worked || b.time || "";
milesworked.value=b.miles || "";
stops.value=b.stops || "";
packages.value=b.packages || "";

saveCard.style.display="block";

window.scrollTo(0,0);
}

function deleteBlock(id){

blocks=blocks.filter(x=>x.id!==id);

localStorage.setItem("ftpblocks",JSON.stringify(blocks));

render();
}

function resetForm(){

editId=null;

formTitle.innerText="Save Block";

blocklength.value="";
pay.value="";
hoursworked.value="";
milesworked.value="";
stops.value="";
packages.value="";

saveCard.style.display="none";
}

function render(){

if(blocks.length===0){
history.innerHTML="<div class='small'>No saved blocks.</div>";
return;
}

history.innerHTML=blocks.map(b=>`
<div class=item>

<b>${b.date || "Saved Block"}</b><br>

${b.block || "Block"} | $${b.pay || "0"}<br>

Worked ${b.worked || b.time || "00:00:00"} | ${b.miles || "0.00"} mi<br>

${b.stops || "0"} stops | ${b.packages || "0"} pkgs

<div class=row>
<button onclick="editBlock(${b.id})">EDIT</button>
<button class="red" onclick="deleteBlock(${b.id})">DELETE</button>
</div>

</div>
`).join("");
}

function clearAll(){
blocks=[];
localStorage.removeItem("ftpblocks");
render();
}

function exportCSV(){

if(blocks.length===0)return;

let csv="Date,Block Length,Pay,Worked Time,Miles,Stops,Packages\n";

blocks.forEach(b=>{
csv+=`${b.date || ""},${b.block || ""},${b.pay || ""},${b.worked || b.time || ""},${b.miles || ""},${b.stops || ""},${b.packages || ""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="flex-track-pro.csv";
a.click();

URL.revokeObjectURL(url);
}

render();
</script>

</body>
</html>
